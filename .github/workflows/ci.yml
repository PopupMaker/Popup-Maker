name: CI - Code Quality

on:
  pull_request:
  workflow_dispatch:

env:
  WP_VERSION: 6.1.1

# Cancels all previous workflow runs for the same branch that have not yet completed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Change Detection - Fast first step to gate expensive jobs
  # ============================================================================
  #
  # tj-actions/changed-files OUTPUT NAMING:
  # ─────────────────────────────────────────────────────────────────────────────
  # This job uses `files_yaml:` to define multiple file categories.
  # With files_yaml, outputs are prefixed with the category name:
  #   - php_any_changed, js_any_changed, css_any_changed, etc.
  #
  # Individual jobs below use `files:` (single category) which outputs:
  #   - any_changed (no prefix)
  #
  # Both patterns are correct for their respective configurations.
  # ─────────────────────────────────────────────────────────────────────────────
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}
    # NOTE: With files_yaml:, outputs are {category}_any_changed
    outputs:
      php: ${{ steps.changes.outputs.php_any_changed }}
      js: ${{ steps.changes.outputs.js_any_changed }}           # All JS/TS (for ESLint)
      js_src: ${{ steps.changes.outputs.js_src_any_changed }}   # All source JS/TS (for build)
      ts_src: ${{ steps.changes.outputs.ts_src_any_changed }}   # TypeScript only (for tsc)
      css: ${{ steps.changes.outputs.css_any_changed }}
      npm_deps: ${{ steps.changes.outputs.npm_deps_any_changed }}
      php_deps: ${{ steps.changes.outputs.php_deps_any_changed }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect file changes
        id: changes
        uses: tj-actions/changed-files@v41
        with:
          # files_yaml: defines multiple categories → outputs are {category}_any_changed
          files_yaml: |
            php:
              - '**/*.php'
              - '!vendor/**'
              - '!vendor-prefixed/**'
            js:
              # All JS/TS for ESLint (config, tooling, source, etc.)
              - '**/*.js'
              - '**/*.ts'
              - '**/*.tsx'
              - '**/*.jsx'
              - '!node_modules/**'
              - '!dist/**'
              - '!build/**'
              - '!vendor/**'
            js_src:
              # All source JS/TS files (for build validation)
              - 'packages/**/src/**/*.ts'
              - 'packages/**/src/**/*.tsx'
              - 'packages/**/src/**/*.js'
              - 'assets/js/src/**/*.js'
            ts_src:
              # TypeScript only (for tsc type checking)
              - 'packages/**/src/**/*.ts'
              - 'packages/**/src/**/*.tsx'
            css:
              # Only source CSS/SCSS (not built output)
              - 'assets/css/src/**/*.css'
              - 'assets/css/src/**/*.scss'
              - 'packages/**/src/**/*.css'
              - 'packages/**/src/**/*.scss'
            npm_deps:
              - 'package.json'
              - 'package-lock.json'
            php_deps:
              - 'composer.json'
              - 'composer.lock'

  # ============================================================================
  # PHP Code Quality - PHPCS & PHPStan
  # ============================================================================
  php-quality:
    name: PHP ${{ matrix.php-version }} - Code Quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'pull_request' && needs.detect-changes.outputs.php == 'true' }}

    strategy:
      fail-fast: false
      matrix:
        # Min + Latest only for faster CI. Uncomment middle versions if needed.
        php-version: ['7.4', '8.2']
        # php-version: ['7.4', '8.0', '8.1', '8.2']

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # NOTE: Using `files:` (not files_yaml) → outputs are just `any_changed`
      - name: Get changed PHP files
        id: changed-files
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.php
          files_ignore: |
            vendor/**
            vendor-prefixed/**
            tests/**
            node_modules/**

      - name: Setup cache extensions
        if: steps.changed-files.outputs.any_changed == 'true'
        id: extcache
        uses: shivammathur/cache-extensions@v1
        with:
          php-version: ${{ matrix.php-version }}
          extensions: 'curl, zip'
          key: php-${{ matrix.php-version }}-ext

      - name: Cache extensions
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: actions/cache@v5
        with:
          path: ${{ steps.extcache.outputs.dir }}
          key: ${{ steps.extcache.outputs.key }}
          restore-keys: ${{ steps.extcache.outputs.key }}

      - name: Setup PHP
        if: steps.changed-files.outputs.any_changed == 'true'
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, zip
          tools: composer, cs2pr, phpcs
          coverage: none

      - name: Install composer dependencies
        if: steps.changed-files.outputs.any_changed == 'true'
        run: composer install --no-interaction --optimize-autoloader --ignore-platform-reqs

      - name: Run PHPCS on changed files
        if: steps.changed-files.outputs.any_changed == 'true'
        id: phpcs
        continue-on-error: true
        run: |
          echo "${{ steps.changed-files.outputs.all_changed_files }}" | tr ' ' '\n' > .changed-files.txt
          # --warning-severity=0: Only fail on errors, not warnings (warnings still shown)
          vendor/bin/phpcs --standard=.phpcs.xml.dist --warning-severity=0 --report-full --report-checkstyle=./phpcs-report.xml --file-list=.changed-files.txt

      - name: Show PHPCS results in PR
        if: steps.changed-files.outputs.any_changed == 'true' && always() && steps.phpcs.outcome == 'failure'
        run: cs2pr ./phpcs-report.xml

      - name: Run PHPStan
        if: steps.changed-files.outputs.any_changed == 'true' && matrix.php-version == '8.2'
        continue-on-error: true
        run: composer phpstan

      - name: Check for PHPCS failures
        if: steps.changed-files.outputs.any_changed == 'true' && steps.phpcs.outcome == 'failure'
        run: exit 1

  # ============================================================================
  # JavaScript/TypeScript Code Quality
  # ============================================================================
  js-quality:
    name: JS/TS Code Quality
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'pull_request' && (needs.detect-changes.outputs.js == 'true' || needs.detect-changes.outputs.css == 'true') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      # NOTE: Using `files:` (not files_yaml) → outputs are just `any_changed`
      # All JS/TS files for ESLint (config, tooling, source, etc.)
      - name: Get changed JS/TS files
        id: changed-js
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.js
            **/*.ts
            **/*.tsx
            **/*.jsx
          files_ignore: |
            node_modules/**
            vendor/**
            dist/**
            build/**
            coverage/**

      # NOTE: Using `files:` (not files_yaml) → outputs are just `any_changed`
      - name: Get changed CSS/SCSS files
        id: changed-css
        uses: tj-actions/changed-files@v41
        with:
          files: |
            **/*.css
            **/*.scss
          files_ignore: |
            node_modules/**
            vendor/**
            dist/**
            build/**

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint on changed files
        if: steps.changed-js.outputs.any_changed == 'true'
        continue-on-error: true
        id: eslint
        run: |
          echo "${{ steps.changed-js.outputs.all_changed_files }}" | xargs npm run lint:js:changed --

      - name: Run Stylelint on changed files
        if: steps.changed-css.outputs.any_changed == 'true'
        continue-on-error: true
        id: stylelint
        run: |
          echo "${{ steps.changed-css.outputs.all_changed_files }}" | xargs npm run lint:style -- --formatter=compact

      # Only type-check when TypeScript files change
      - name: Run TypeScript type checking
        if: needs.detect-changes.outputs.ts_src == 'true'
        continue-on-error: true
        id: tsc
        run: npm run build:tsc

      - name: Check for linting failures
        if: steps.eslint.outcome == 'failure' || steps.stylelint.outcome == 'failure' || steps.tsc.outcome == 'failure'
        run: |
          echo "❌ Code quality checks failed:"
          [[ "${{ steps.eslint.outcome }}" == "failure" ]] && echo "  - ESLint found issues"
          [[ "${{ steps.stylelint.outcome }}" == "failure" ]] && echo "  - Stylelint found issues"
          [[ "${{ steps.tsc.outcome }}" == "failure" ]] && echo "  - TypeScript type errors"
          exit 1

  # ============================================================================
  # Build Validation
  # ============================================================================
  build-validation:
    name: Build Validation
    runs-on: ubuntu-latest
    needs: detect-changes
    # Only build when source files change (not config/tooling JS)
    if: ${{ github.event_name == 'pull_request' && (needs.detect-changes.outputs.js_src == 'true' || needs.detect-changes.outputs.npm_deps == 'true') }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate dependency tree
        continue-on-error: true
        id: dep-tree
        run: npm run validate:dep-tree

      - name: Build project
        id: build
        run: npm run build

      - name: Check for build failures
        if: steps.build.outcome == 'failure'
        run: |
          echo "❌ Build failed - webpack compilation errors detected"
          exit 1

      - name: Report dependency tree issues
        if: steps.dep-tree.outcome == 'failure'
        run: |
          echo "⚠️ Dependency tree validation found issues"
          echo "Run 'npm run validate:dep-tree:fix' locally to resolve"

  # ============================================================================
  # Security Scanning - NPM Dependencies
  # ============================================================================
  npm-security:
    name: NPM Security Audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'pull_request' && needs.detect-changes.outputs.npm_deps == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run npm audit
        continue-on-error: true
        run: npm audit --audit-level=high || echo "⚠️ NPM audit found vulnerabilities"

  # ============================================================================
  # Security Scanning - Composer Dependencies
  # ============================================================================
  php-security:
    name: Composer Security Audit
    runs-on: ubuntu-latest
    needs: detect-changes
    if: ${{ github.event_name == 'pull_request' && needs.detect-changes.outputs.php_deps == 'true' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer

      - name: Install composer dependencies
        run: composer install --no-interaction --ignore-platform-reqs

      - name: Run composer audit
        continue-on-error: true
        run: composer audit || echo "⚠️ Composer audit found vulnerabilities"

  # ============================================================================
  # PHPUnit Tests (DISABLED - Enable when test suite is comprehensive)
  # ============================================================================
  phpunit:
    name: PHPUnit - PHP ${{ matrix.php-version }}
    runs-on: ubuntu-latest
    if: false # Disabled until test suite is more comprehensive

    strategy:
      fail-fast: false
      matrix:
        php-version: ['7.4', '8.0', '8.1', '8.2']

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_ROOT_PASSWORD: password
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          extensions: curl, mysql, zip
          coverage: xdebug

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --ignore-platform-reqs

      - name: Install WordPress test environment
        run: bash bin/install-wp-tests.sh wordpress_test root 'password' mysql

      - name: Run PHPUnit tests
        run: composer tests
