name: Draft Release

on:
    push:
        tags:
            - 'v*'

jobs:
    build:
        name: Build & Draft Release
        runs-on: ubuntu-latest

        outputs:
            version: ${{ steps.version.outputs.version }}
            zip_name: ${{ steps.zip.outputs.name }}
            release_url: ${{ steps.release.outputs.html_url }}
            is_prerelease: ${{ steps.version.outputs.is_prerelease }}

        steps:
            - name: Checkout tag
              uses: actions/checkout@v4

            - name: Extract version from tag
              id: version
              env:
                  TAG: ${{ github.ref_name }}
              run: |
                  # Strip v prefix for version number.
                  VERSION="${TAG#v}"
                  echo "version=${VERSION}" >> $GITHUB_OUTPUT
                  echo "Version: ${VERSION}"

                  # Detect pre-release.
                  if echo "$VERSION" | grep -qE '-(alpha|beta|rc)'; then
                    echo "is_prerelease=true" >> $GITHUB_OUTPUT
                  else
                    echo "is_prerelease=false" >> $GITHUB_OUTPUT
                  fi

            - name: Setup PHP
              uses: shivammathur/setup-php@v2
              with:
                  php-version: '8.0'
                  tools: composer:v2
                  coverage: none

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'
                  cache: 'npm'

            - name: Install dependencies
              run: |
                  composer install --no-dev --optimize-autoloader --no-interaction --no-progress
                  npm ci

            - name: Build production assets
              run: npm run build:production

            - name: Create release package
              id: zip
              env:
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  if [ -f "bin/build-release.js" ]; then
                    node bin/build-release.js --zip-name "popup-maker_${VERSION}.zip"
                  else
                    npm run release
                  fi
                  echo "name=popup-maker_${VERSION}.zip" >> $GITHUB_OUTPUT

            - name: Extract changelog
              id: changelog
              env:
                  VERSION: ${{ steps.version.outputs.version }}
              run: |
                  if [ -f "bin/extract-changelog.js" ]; then
                    CHANGELOG=$(node bin/extract-changelog.js "$VERSION" 2>/dev/null || echo "Release $VERSION")
                  elif [ -f "CHANGELOG.md" ]; then
                    # Extract section for this version.
                    CHANGELOG=$(awk "/^## .*${VERSION}/,/^## /" CHANGELOG.md | head -n -1 | tail -n +2)
                  fi

                  if [ -z "$CHANGELOG" ]; then
                    CHANGELOG="Release ${VERSION}"
                  fi

                  echo "content<<EOF" >> $GITHUB_OUTPUT
                  echo "$CHANGELOG" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create Draft Release
              id: release
              uses: softprops/action-gh-release@v2
              with:
                  name: Popup Maker ${{ steps.version.outputs.version }}
                  body: ${{ steps.changelog.outputs.content }}
                  files: ${{ steps.zip.outputs.name }}
                  draft: true
                  prerelease: ${{ steps.version.outputs.is_prerelease == 'true' }}
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

            - name: Display Release Link
              env:
                  URL: ${{ steps.release.outputs.html_url }}
              run: |
                  echo "Draft release: $URL"
                  echo "### Draft Release Created" >> $GITHUB_STEP_SUMMARY
                  echo "[View Draft Release]($URL)" >> $GITHUB_STEP_SUMMARY
