name: Sync readme/assets to WordPress.org

on:
    push:
        branches:
            - master
    workflow_dispatch:

env:
    PLUGIN_SLUG: popup-maker
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
    check-deploy:
        name: Check for active deploy
        runs-on: ubuntu-latest
        outputs:
            should_run: ${{ steps.check.outputs.should_run }}
        steps:
            - name: Check if deploy workflow is running
              id: check
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  REPO: ${{ github.repository }}
              run: |
                  # Check if deploy-to-wordpress workflow is in progress or queued.
                  ACTIVE=$(gh api "repos/${REPO}/actions/workflows" \
                    --jq '.workflows[] | select(.name == "Deploy to WordPress.org") | .id' 2>/dev/null)

                  if [ -n "$ACTIVE" ]; then
                    RUNNING=$(gh api "repos/${REPO}/actions/workflows/${ACTIVE}/runs?status=in_progress&per_page=1" \
                      --jq '.total_count' 2>/dev/null || echo "0")
                    QUEUED=$(gh api "repos/${REPO}/actions/workflows/${ACTIVE}/runs?status=queued&per_page=1" \
                      --jq '.total_count' 2>/dev/null || echo "0")

                    if [ "$RUNNING" -gt 0 ] || [ "$QUEUED" -gt 0 ]; then
                      echo "⏭️ Deploy workflow is active — skipping readme sync"
                      echo "should_run=false" >> $GITHUB_OUTPUT
                      exit 0
                    fi
                  fi

                  echo "✅ No deploy running — proceeding with readme sync"
                  echo "should_run=true" >> $GITHUB_OUTPUT

    update:
        name: Update WordPress.org readme & assets
        runs-on: ubuntu-latest
        needs: check-deploy
        if: needs.check-deploy.outputs.should_run == 'true'

        steps:
            - name: Checkout
              uses: actions/checkout@v6

            - name: Sync to WordPress.org SVN
              uses: 10up/action-wordpress-plugin-asset-update@stable
              env:
                  SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
                  SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
                  SLUG: ${{ env.PLUGIN_SLUG }}
                  ASSETS_DIR: .wordpress-org
                  IGNORE_OTHER_FILES: true
