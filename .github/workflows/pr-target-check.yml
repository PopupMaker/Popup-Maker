name: PR target check

on:
    pull_request_target:
        types: [opened, edited]
        branches:
            - master

jobs:
    redirect:
        runs-on: ubuntu-latest
        if: "!contains(github.event.pull_request.labels.*.name, 'hotfix')"
        steps:
            - name: Retarget to develop
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_NUMBER: ${{ github.event.pull_request.number }}
                  REPO: ${{ github.repository }}
              run: |
                  gh pr edit "$PR_NUMBER" --repo "$REPO" --base develop

                  gh pr comment "$PR_NUMBER" --repo "$REPO" \
                    --body "Heads up — this PR was retargeted to \`develop\`. Master is only updated via release merges."
