name: Release

on:
  push:
    tags:
      - '[0-9]+\.[0-9]+\.[0-9]+'
      - '[0-9]+\.[0-9]+\.[0-9]+-test'
  workflow_dispatch:

env:
  PLUGIN_SLUG: popup-maker
  PLUGIN_NAME: Popup Maker
  PLUGIN_MAIN_FILE: popup-maker.php

jobs:
  # ============================================================================
  # BUILD RELEASE PACKAGE
  # ============================================================================
  build:
    name: Build Release Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
      is_test: ${{ steps.extract.outputs.is_test }}
      zip_name: ${{ steps.build.outputs.zip_name }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Extract version from tag
        id: extract
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION="${TAG_NAME}"
          IS_TEST="false"

          if [[ $VERSION =~ ^[0-9]+\.[0-9]+\.[0-9]+-test$ ]]; then
            IS_TEST="true"
            VERSION="${VERSION%-test}"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_test=${IS_TEST}" >> $GITHUB_OUTPUT

      - name: Setup PHP 8.0
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20.19'

      - name: Install PHP dependencies
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Install Node dependencies
        run: |
          npm ci

      - name: Build production assets
        run: |
          npm run build:production

      - name: Create release package
        id: build
        env:
          VERSION: ${{ steps.extract.outputs.version }}
        run: |
          ZIP_NAME="${{ env.PLUGIN_SLUG }}_${VERSION}.zip"

          node bin/build-release.js --zip-name "${ZIP_NAME}"

          echo "zip_name=${ZIP_NAME}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PLUGIN_SLUG }}-release
          path: ${{ steps.build.outputs.zip_name }}
          retention-days: 30

  # ============================================================================
  # CREATE GITHUB RELEASE
  # ============================================================================
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write

    outputs:
      release_url: ${{ steps.gh_release.outputs.url }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.PLUGIN_SLUG }}-release

      - name: Extract changelog
        id: changelog
        env:
          VERSION: ${{ needs.build.outputs.version }}
        run: |
          CHANGELOG=""

          if [ -f "bin/extract-changelog.js" ]; then
            CHANGELOG=$(node bin/extract-changelog.js "$VERSION")
          else
            # Fallback to awk-based extraction.
            if [ -f "CHANGELOG.md" ]; then
              CHANGELOG=$(awk -v version="$VERSION" '/^## [0-9]+\.[0-9]+\.[0-9]+/ {if (found) exit; if ($2 == version) found=1; next} found && NF' CHANGELOG.md | head -20)
            fi
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release $VERSION"
          fi

          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub release
        id: gh_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          body: ${{ steps.changelog.outputs.content }}
          files: ${{ needs.build.outputs.zip_name }}
          draft: ${{ needs.build.outputs.is_test == 'true' }}
          prerelease: ${{ needs.build.outputs.is_test == 'true' }}

  # ============================================================================
  # DEPLOY TO WORDPRESS.ORG (STABLE ONLY)
  # ============================================================================
  wordpress-deploy:
    name: Deploy to WordPress.org
    runs-on: ubuntu-latest
    needs: [build, release]
    if: needs.build.outputs.is_test == 'false'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP 8.0
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20.19'

      - name: Install PHP dependencies
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Install Node dependencies
        run: |
          npm ci

      - name: Build production assets
        run: |
          npm run build:production

      - name: Deploy to WordPress.org
        uses: 10up/action-wordpress-plugin-deploy@stable
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ env.PLUGIN_SLUG }}
          VERSION: ${{ needs.build.outputs.version }}
          ASSETS_DIR: .github/assets

  # ============================================================================
  # DEPLOY TO WORDPRESS.ORG (DRY RUN FOR TEST TAGS)
  # ============================================================================
  wordpress-deploy-test:
    name: Deploy to WordPress.org (Test)
    runs-on: ubuntu-latest
    needs: [build, release]
    if: needs.build.outputs.is_test == 'true'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP 8.0
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js 20
        uses: actions/setup-node@v6
        with:
          node-version: '20.19'

      - name: Install PHP dependencies
        run: |
          composer install --no-dev --optimize-autoloader

      - name: Install Node dependencies
        run: |
          npm ci

      - name: Build production assets
        run: |
          npm run build:production

      - name: Deploy to WordPress.org (Dry Run)
        uses: 10up/action-wordpress-plugin-deploy@stable
        with:
          dry-run: true
        env:
          SVN_USERNAME: ${{ secrets.SVN_USERNAME }}
          SVN_PASSWORD: ${{ secrets.SVN_PASSWORD }}
          SLUG: ${{ env.PLUGIN_SLUG }}
          VERSION: ${{ needs.build.outputs.version }}
          ASSETS_DIR: .github/assets

  # ============================================================================
  # SYNC TO EDD (STABLE RELEASES ONLY)
  # ============================================================================
  edd-sync:
    name: Sync to EDD
    runs-on: ubuntu-latest
    needs: [build, release]
    if: |
      needs.build.outputs.is_test == 'false' &&
      vars.EDD_PRODUCT_ID != '' &&
      vars.EDD_PRODUCT_ID != '0'

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.PLUGIN_SLUG }}-release

      - name: Get asset info
        id: asset
        env:
          ZIP_FILE: ${{ needs.build.outputs.zip_name }}
        run: |
          SIZE=$(ls -lh "$ZIP_FILE" | awk '{print $5}')
          SHA=$(sha256sum "$ZIP_FILE" | awk '{print $1}')

          echo "size=${SIZE}" >> $GITHUB_OUTPUT
          echo "sha256=${SHA}" >> $GITHUB_OUTPUT

      - name: Sync to EDD
        uses: code-atlantic/edd-release-sync@v0.2.0
        with:
          version: ${{ needs.build.outputs.version }}
          edd_id: ${{ vars.EDD_PRODUCT_ID }}
          release_url: https://github.com/${{ github.repository }}/releases/tag/${{ github.ref_name }}
          download_url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ needs.build.outputs.zip_name }}
          asset_api_url: https://api.github.com/repos/${{ github.repository }}/releases/latest/assets
          webhook_url: ${{ secrets.EDD_STORE_URL }}
          webhook_token: ${{ secrets.EDD_API_KEY }}

  # ============================================================================
  # UPLOAD TO GOOGLE DRIVE
  # ============================================================================
  google-drive:
    name: Upload to Google Drive
    runs-on: ubuntu-latest
    needs: [build, release]
    if: vars.GOOGLE_DRIVE_FOLDER_ID != ''
    continue-on-error: true

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.PLUGIN_SLUG }}-release

      - name: Determine folder ID
        id: folder
        env:
          IS_TEST: ${{ needs.build.outputs.is_test }}
          FOLDER_ID: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
          BETA_FOLDER_ID: ${{ vars.GOOGLE_DRIVE_BETA_FOLDER_ID }}
        run: |
          if [ "$IS_TEST" == "true" ] && [ -n "$BETA_FOLDER_ID" ]; then
            echo "folder=${BETA_FOLDER_ID}" >> $GITHUB_OUTPUT
          else
            echo "folder=${FOLDER_ID}" >> $GITHUB_OUTPUT
          fi

      - name: Upload to Google Drive
        uses: adityak74/google-drive-upload-git-action@v0.3
        with:
          credentials: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          folderId: ${{ steps.folder.outputs.folder }}
          filename: ${{ needs.build.outputs.zip_name }}

  # ============================================================================
  # SLACK NOTIFICATION
  # ============================================================================
  slack-notify:
    name: Slack Notification
    runs-on: ubuntu-latest
    needs: [build, release]
    if: always()

    steps:
      - name: Determine status
        id: status
        env:
          IS_TEST: ${{ needs.build.outputs.is_test }}
          RELEASE_RESULT: ${{ needs.release.result }}
        run: |
          if [ "$IS_TEST" == "true" ]; then
            echo "emoji=🧪" >> $GITHUB_OUTPUT
            echo "status=TEST" >> $GITHUB_OUTPUT
          elif [ "$RELEASE_RESULT" == "success" ]; then
            echo "emoji=🚀" >> $GITHUB_OUTPUT
            echo "status=DEPLOYED" >> $GITHUB_OUTPUT
          else
            echo "emoji=❌" >> $GITHUB_OUTPUT
            echo "status=FAILED" >> $GITHUB_OUTPUT
          fi

      - name: Send Slack notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          EMOJI: ${{ steps.status.outputs.emoji }}
          STATUS: ${{ steps.status.outputs.status }}
          VERSION: ${{ needs.build.outputs.version }}
          IS_TEST: ${{ needs.build.outputs.is_test }}
          RELEASE_RESULT: ${{ needs.release.result }}
          RELEASE_URL: ${{ needs.release.outputs.release_url }}
          PLUGIN: ${{ env.PLUGIN_NAME }}
          REPO: ${{ github.repository }}
        run: |
          # Skip if no webhook configured.
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "No Slack webhook configured, skipping."
            exit 0
          fi

          RELEASE_TYPE="Stable"
          [ "$IS_TEST" == "true" ] && RELEASE_TYPE="Test Lane"

          GH_STATUS="✅ Created"
          [ "$RELEASE_RESULT" != "success" ] && GH_STATUS="❌ Failed"

          CHANGELOG_URL="https://github.com/${REPO}/blob/master/CHANGELOG.md"

          PAYLOAD=$(jq -n \
            --arg emoji "$EMOJI" \
            --arg status "$STATUS" \
            --arg plugin "$PLUGIN" \
            --arg version "$VERSION" \
            --arg release_type "$RELEASE_TYPE" \
            --arg gh_status "$GH_STATUS" \
            --arg release_url "$RELEASE_URL" \
            --arg changelog_url "$CHANGELOG_URL" \
            '{
              "text": "\($emoji) \($status) - \($plugin) \($version)",
              "blocks": [
                {
                  "type": "header",
                  "text": { "type": "plain_text", "text": "\($emoji) \($status) - \($plugin) \($version)", "emoji": true }
                },
                {
                  "type": "section",
                  "fields": [
                    { "type": "mrkdwn", "text": "*Version:*\n\($version)" },
                    { "type": "mrkdwn", "text": "*Release Type:*\n\($release_type)" },
                    { "type": "mrkdwn", "text": "*GitHub Release:*\n\($gh_status)" }
                  ]
                },
                {
                  "type": "section",
                  "text": { "type": "mrkdwn", "text": "*Support Actions:*\n• Review changelog for customer communications\n• Update documentation if needed\n• Monitor support channels for issues" }
                },
                { "type": "divider" },
                {
                  "type": "actions",
                  "elements": [
                    { "type": "button", "text": { "type": "plain_text", "text": "📖 Full Changelog", "emoji": true }, "url": "\($release_url)" },
                    { "type": "button", "text": { "type": "plain_text", "text": "📋 CHANGELOG.md", "emoji": true }, "url": "\($changelog_url)" }
                  ]
                }
              ]
            }')

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"

  # ============================================================================
  # RELEASE SUMMARY
  # ============================================================================
  release-summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build, release, wordpress-deploy, edd-sync, google-drive]
    if: always()

    steps:
      - name: Generate summary
        env:
          VERSION: ${{ needs.build.outputs.version }}
          IS_TEST: ${{ needs.build.outputs.is_test }}
          BUILD_RESULT: ${{ needs.build.result }}
          RELEASE_RESULT: ${{ needs.release.result }}
          DEPLOY_RESULT: ${{ needs.wordpress-deploy.result }}
          EDD_RESULT: ${{ needs.edd-sync.result }}
          GDRIVE_RESULT: ${{ needs.google-drive.result }}
        run: |
          echo "# Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Job | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Build | $([ "${BUILD_RESULT}" == "success" ] && echo "✅" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| Release | $([ "${RELEASE_RESULT}" == "success" ] && echo "✅" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| WordPress.org Deploy | $([ "${DEPLOY_RESULT}" == "success" ] && echo "✅" || [ "${DEPLOY_RESULT}" == "skipped" ] && echo "⏭️" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| EDD Sync | $([ "${EDD_RESULT}" == "success" ] && echo "✅" || [ "${EDD_RESULT}" == "skipped" ] && echo "⏭️" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "| Google Drive | $([ "${GDRIVE_RESULT}" == "success" ] && echo "✅" || [ "${GDRIVE_RESULT}" == "skipped" ] && echo "⏭️" || echo "❌") |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "**Release Type:** $([ "${IS_TEST}" == "true" ] && echo "🧪 Test Lane" || echo "🚀 Stable")" >> $GITHUB_STEP_SUMMARY
