name: Release

on:
  push:
    tags:
      - '[0-9]+\.[0-9]+\.[0-9]+'
      - '[0-9]+\.[0-9]+\.[0-9]+-*'

env:
  PLUGIN_SLUG: popup-maker
  PLUGIN_NAME: Popup Maker
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ============================================================================
  # BUILD RELEASE PACKAGE
  # ============================================================================
  build:
    name: Build Release Package
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.info.outputs.version }}
      is_test: ${{ steps.info.outputs.is_test }}
      is_prerelease: ${{ steps.info.outputs.is_prerelease }}
      zip_name: ${{ steps.package.outputs.name }}
      changelog_content: ${{ steps.changelog.outputs.content }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Extract release information
        id: info
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG}"
          IS_TEST="false"
          IS_PRERELEASE="false"

          if [[ "$VERSION" =~ -test$ ]]; then
            IS_TEST="true"
            VERSION="${VERSION%-test}"
          elif [[ "$VERSION" =~ -(alpha|beta|rc) ]]; then
            IS_PRERELEASE="true"
          fi

          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "is_test=${IS_TEST}" >> $GITHUB_OUTPUT
          echo "is_prerelease=${IS_PRERELEASE}" >> $GITHUB_OUTPUT

          echo "📦 Plugin: ${{ env.PLUGIN_NAME }}"
          echo "🏷️ Version: ${VERSION}"
          echo "🧪 Test: ${IS_TEST}"
          echo "🔖 Pre-release: ${IS_PRERELEASE}"

      - name: Extract changelog
        id: changelog
        env:
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          CHANGELOG=""

          if [ -f "bin/extract-changelog.js" ]; then
            CHANGELOG=$(node bin/extract-changelog.js "$VERSION" 2>/dev/null || echo "")
          fi

          if [ -z "$CHANGELOG" ] && [ -f "CHANGELOG.md" ]; then
            CHANGELOG=$(sed -n "/^## \[*v*${VERSION}[]\) -]*/,/^## /p" CHANGELOG.md | sed '1d;$d' | awk 'NF {p=1} p')
          fi

          if [ -z "$CHANGELOG" ]; then
            CHANGELOG="Release ${VERSION}"
          fi

          {
            echo 'content<<EOF'
            echo "$CHANGELOG"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.0'
          tools: composer:v2
          coverage: none

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: |
          composer install --no-dev --optimize-autoloader --no-interaction --no-progress
          npm ci

      - name: Build production assets
        run: npm run build:production

      - name: Create release package
        id: package
        env:
          VERSION: ${{ steps.info.outputs.version }}
        run: |
          ZIP_NAME="${{ env.PLUGIN_SLUG }}_${VERSION}.zip"

          if [ -f "bin/build-release.js" ]; then
            node bin/build-release.js --zip-name "${ZIP_NAME}"
          else
            npm run release
          fi

          if [ ! -f "${ZIP_NAME}" ]; then
            echo "❌ Package not found: ${ZIP_NAME}"
            exit 1
          fi

          FILE_SIZE=$(ls -lh "${ZIP_NAME}" | awk '{print $5}')
          echo "✅ Package created: ${ZIP_NAME} (${FILE_SIZE})"
          echo "name=${ZIP_NAME}" >> $GITHUB_OUTPUT

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ env.PLUGIN_SLUG }}-${{ steps.info.outputs.version }}
          path: ${{ steps.package.outputs.name }}
          retention-days: 30

  # ============================================================================
  # CREATE GITHUB RELEASE
  # ============================================================================
  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    outputs:
      release_url: ${{ steps.set_url.outputs.release_url }}
      release_id: ${{ steps.release.outputs.id }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.PLUGIN_SLUG }}-${{ needs.build.outputs.version }}

      - name: Create GitHub Release
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ env.PLUGIN_NAME }} ${{ needs.build.outputs.version }}
          body: |
            ${{ needs.build.outputs.changelog_content }}
          files: ${{ needs.build.outputs.zip_name }}
          draft: ${{ needs.build.outputs.is_test == 'true' }}
          prerelease: ${{ needs.build.outputs.is_prerelease == 'true' }}

      - name: Set release URL
        id: set_url
        env:
          TAG: ${{ github.ref_name }}
          REPO: ${{ github.repository }}
        run: |
          RELEASE_URL="https://github.com/${REPO}/releases/tag/${TAG}"
          echo "release_url=${RELEASE_URL}" >> $GITHUB_OUTPUT

  # ============================================================================
  # NOTIFY EDD STORE
  # ============================================================================
  edd-webhook:
    name: Notify EDD Store
    runs-on: ubuntu-latest
    needs: [build, github-release]
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.github-release.result == 'success'

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get release asset API URL
        id: get_asset
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ needs.build.outputs.zip_name }}
          RELEASE_ID: ${{ needs.github-release.outputs.release_id }}
          REPO: ${{ github.repository }}
        run: |
          # Use release ID (works for draft + published releases).
          ASSET_URL=$(gh api "repos/${REPO}/releases/${RELEASE_ID}" \
            --jq ".assets[] | select(.name == \"${PACKAGE_NAME}\") | .url")

          if [ -z "$ASSET_URL" ] || [ "$ASSET_URL" == "null" ]; then
            echo "⚠️ Could not find asset URL for ${PACKAGE_NAME}"
            echo "asset_url=" >> $GITHUB_OUTPUT
          else
            echo "asset_url=${ASSET_URL}" >> $GITHUB_OUTPUT
            echo "✅ Asset API URL: ${ASSET_URL}"
          fi

      - name: Sync release to EDD
        uses: code-atlantic/edd-release-sync@v0.2.0
        with:
          edd_id: ${{ vars.EDD_PRODUCT_ID }}
          version: ${{ needs.build.outputs.version }}
          release_url: ${{ needs.github-release.outputs.release_url }}
          download_url: https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/${{ needs.build.outputs.zip_name }}
          asset_api_url: ${{ steps.get_asset.outputs.asset_url }}
          webhook_url: ${{ vars.EDD_WEBHOOK_URL }}
          webhook_token: ${{ secrets.EDD_WEBHOOK_TOKEN }}
          plugin_slug: ${{ env.PLUGIN_SLUG }}
          is_prerelease: ${{ needs.build.outputs.is_prerelease }}
          test_mode: ${{ needs.build.outputs.is_test }}

  # ============================================================================
  # UPLOAD TO GOOGLE DRIVE
  # ============================================================================
  google-drive-upload:
    name: Upload to Google Drive
    runs-on: ubuntu-latest
    needs: [build, github-release]
    if: needs.build.result == 'success' && needs.github-release.result == 'success'
    outputs:
      file_id: ${{ steps.upload.outputs.file_id }}
      web_view_link: ${{ steps.upload.outputs.web_view_link }}
      download_link: ${{ steps.upload.outputs.download_link }}
      updated: ${{ steps.upload.outputs.updated }}
      skipped: ${{ steps.upload.outputs.skipped }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v7
        with:
          name: ${{ env.PLUGIN_SLUG }}-${{ needs.build.outputs.version }}

      - name: Upload to Google Drive
        id: upload
        uses: code-atlantic/sync-release-to-google-drive@v0.3.1
        with:
          filename: ${{ needs.build.outputs.zip_name }}
          credentials: ${{ secrets.GOOGLE_DRIVE_CREDENTIALS }}
          folder_id: ${{ vars.GOOGLE_DRIVE_FOLDER_ID }}
          overwrite: 'true'
          sharing: anyone
          link_discoverable: false

  # ============================================================================
  # SLACK NOTIFICATION (runs after EDD + GDrive)
  # ============================================================================
  slack-notification-success:
    name: Slack Success Notification
    runs-on: ubuntu-latest
    needs: [build, github-release, edd-webhook, google-drive-upload]
    if: |
      always() &&
      needs.build.result == 'success' &&
      needs.github-release.result == 'success'

    steps:
      - name: Send success notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          PLUGIN_NAME: ${{ env.PLUGIN_NAME }}
          VERSION: ${{ needs.build.outputs.version }}
          IS_TEST: ${{ needs.build.outputs.is_test }}
          RELEASE_URL: ${{ needs.github-release.outputs.release_url }}
          CHANGELOG: ${{ needs.build.outputs.changelog_content }}
          DRIVE_DOWNLOAD_URL: ${{ needs.google-drive-upload.outputs.download_link }}
          EDD_RESULT: ${{ needs.edd-webhook.result }}
          GDRIVE_RESULT: ${{ needs.google-drive-upload.result }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            echo "⚠️ No Slack webhook configured"
            exit 0
          fi

          EMOJI="🚀"
          [ "$IS_TEST" == "true" ] && EMOJI="🧪"

          EDD_STATUS="✅"
          [ "$EDD_RESULT" != "success" ] && EDD_STATUS="⚠️"
          GDRIVE_STATUS="✅"
          [ "$GDRIVE_RESULT" != "success" ] && GDRIVE_STATUS="⚠️"

          # Convert Markdown to Slack mrkdwn.
          CONVERTED=$(echo "$CHANGELOG" \
            | sed 's/\*\*\([^*]*\)\*\*/*\1*/g' \
            | sed 's/\[\([^]]*\)\](\([^)]*\))/<\2|\1>/g')

          # Truncate to 10 lines. If longer, add "view full" note.
          TOTAL_LINES=$(echo "$CONVERTED" | wc -l)
          TRUNCATED=$(echo "$CONVERTED" | head -10)
          WAS_TRUNCATED="false"
          [ "$TOTAL_LINES" -gt 10 ] && WAS_TRUNCATED="true"

          CHANGELOG_URL="https://github.com/${REPO}/blob/master/CHANGELOG.md"

          # Use jq for safe JSON — all newlines handled inside jq template.
          PAYLOAD=$(jq -n \
            --arg emoji "$EMOJI" \
            --arg plugin "$PLUGIN_NAME" \
            --arg version "$VERSION" \
            --arg changelog "$TRUNCATED" \
            --argjson more "$WAS_TRUNCATED" \
            --arg release_url "$RELEASE_URL" \
            --arg changelog_url "$CHANGELOG_URL" \
            --arg drive_url "$DRIVE_DOWNLOAD_URL" \
            --arg edd_status "$EDD_STATUS" \
            --arg gdrive_status "$GDRIVE_STATUS" \
            --argjson is_test "$( [ "$IS_TEST" == "true" ] && echo true || echo false )" \
            '{
              text: (
                "\($emoji) *\($plugin) \($version)*\n\n"
                + "\($changelog)\n"
                + (if $more then "_<\($changelog_url)|…see full changelog>_\n" else "" end)
                + "\n*Downloads:*\n"
                + "📖 <\($release_url)|GitHub Release>\n"
                + (if $drive_url != "" then "⬇️ <\($drive_url)|Download Zip (shareable)>\n" else "" end)
                + "📋 <\($changelog_url)|CHANGELOG.md>\n"
                + "\n*Status:* EDD \($edd_status) | GDrive \($gdrive_status)"
                + (if $is_test then "\n_🧪 Test release — not published to WordPress.org_" else "" end)
              ),
              username: "Release Bot",
              icon_emoji: ":package:"
            }')

          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD" \
            --fail --show-error

          echo "✅ Slack sent"

  slack-notification-failure:
    name: Slack Failure Notification
    runs-on: ubuntu-latest
    needs: [build, github-release, edd-webhook, google-drive-upload]
    if: |
      always() &&
      needs.build.result == 'success' &&
      (needs.github-release.result == 'failure' || needs.edd-webhook.result == 'failure' || needs.google-drive-upload.result == 'failure')

    steps:
      - name: Send failure notification
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK }}
          PLUGIN_NAME: ${{ env.PLUGIN_NAME }}
          VERSION: ${{ needs.build.outputs.version }}
          GH_RESULT: ${{ needs.github-release.result }}
          EDD_RESULT: ${{ needs.edd-webhook.result }}
          GDRIVE_RESULT: ${{ needs.google-drive-upload.result }}
          RUN_ID: ${{ github.run_id }}
          REPO: ${{ github.repository }}
        run: |
          if [ -z "$SLACK_WEBHOOK_URL" ]; then
            exit 0
          fi

          GH_STATUS="✅"
          [ "$GH_RESULT" != "success" ] && GH_STATUS="❌"
          EDD_STATUS="✅"
          [ "$EDD_RESULT" != "success" ] && EDD_STATUS="❌"
          GDRIVE_STATUS="✅"
          [ "$GDRIVE_RESULT" != "success" ] && GDRIVE_STATUS="❌"

          MESSAGE="*🚨 RELEASE FAILURE: ${PLUGIN_NAME} ${VERSION}*\n\n"
          MESSAGE="${MESSAGE}• *GitHub:* ${GH_STATUS}\n"
          MESSAGE="${MESSAGE}• *EDD:* ${EDD_STATUS}\n"
          MESSAGE="${MESSAGE}• *Drive:* ${GDRIVE_STATUS}\n\n"
          MESSAGE="${MESSAGE}🔍 <https://github.com/${REPO}/actions/runs/${RUN_ID}|View Workflow>"

          curl -X POST \
            --data-urlencode "payload={\"text\": \"${MESSAGE}\", \"username\": \"Release Bot\", \"icon_emoji\": \":package:\"}" \
            "$SLACK_WEBHOOK_URL" \
            --fail --silent --show-error

  # ============================================================================
  # RELEASE SUMMARY
  # ============================================================================
  summary:
    name: Release Summary
    runs-on: ubuntu-latest
    needs: [build, github-release, edd-webhook, google-drive-upload, slack-notification-success, slack-notification-failure]
    if: always()

    steps:
      - name: Generate summary
        env:
          VERSION: ${{ needs.build.outputs.version }}
          IS_TEST: ${{ needs.build.outputs.is_test }}
          IS_PRERELEASE: ${{ needs.build.outputs.is_prerelease }}
          RELEASE_URL: ${{ needs.github-release.outputs.release_url }}
          BUILD_RESULT: ${{ needs.build.result }}
          GH_RESULT: ${{ needs.github-release.result }}
          EDD_RESULT: ${{ needs.edd-webhook.result }}
          GDRIVE_RESULT: ${{ needs.google-drive-upload.result }}
          SLACK_OK: ${{ needs.slack-notification-success.result }}
          SLACK_FAIL: ${{ needs.slack-notification-failure.result }}
        run: |
          TYPE="🚀 Stable"
          [ "$IS_TEST" == "true" ] && TYPE="🧪 Test Lane"
          [ "$IS_PRERELEASE" == "true" ] && TYPE="🔶 Pre-release"

          echo "# Release Summary: ${{ env.PLUGIN_NAME }} ${VERSION}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** ${TYPE}" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${RELEASE_URL}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          [ "$BUILD_RESULT" == "success" ] && echo "✅ **Build**: Package created" >> $GITHUB_STEP_SUMMARY || echo "❌ **Build**: Failed" >> $GITHUB_STEP_SUMMARY
          [ "$GH_RESULT" == "success" ] && echo "✅ **GitHub Release**: Created" >> $GITHUB_STEP_SUMMARY || echo "❌ **GitHub Release**: Failed" >> $GITHUB_STEP_SUMMARY
          [ "$EDD_RESULT" == "success" ] && echo "✅ **EDD Webhook**: Delivered" >> $GITHUB_STEP_SUMMARY || echo "⚠️ **EDD Webhook**: ${EDD_RESULT}" >> $GITHUB_STEP_SUMMARY
          [ "$GDRIVE_RESULT" == "success" ] && echo "✅ **Google Drive**: Uploaded" >> $GITHUB_STEP_SUMMARY || echo "⚠️ **Google Drive**: ${GDRIVE_RESULT}" >> $GITHUB_STEP_SUMMARY
          [ "$SLACK_OK" == "success" ] && echo "✅ **Slack**: Notified" >> $GITHUB_STEP_SUMMARY || [ "$SLACK_FAIL" == "success" ] && echo "⚠️ **Slack**: Failure notice sent" >> $GITHUB_STEP_SUMMARY || echo "⚠️ **Slack**: ${SLACK_OK}" >> $GITHUB_STEP_SUMMARY

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "*WordPress.org deploy triggers separately on merge to master.*" >> $GITHUB_STEP_SUMMARY
